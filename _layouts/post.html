---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}" itemprop="datePublished">
        {{ page.date | date: '%B %d, %Y' }}
      </time>
      {% if page.author %}
        &middot; {{ page.author }}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% include comments.html %}
</article>

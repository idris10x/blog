<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        {% if page.title %}
        <title>{{ page.title }} | {{ site.title }}</title>
        {% else %}
        <title>{{ site.title }}</title>
        {% endif %}

        <meta
            name="description"
            content="{{ page.description | default: site.description }}"
        />

        <link
            rel="stylesheet"
            href="{{ '/assets/css/style.css' | relative_url }}"
        />
        <link
            rel="canonical"
            href="{{ page.url | replace:'index.html','' | prepend: site.url }}"
        />
        <link
            rel="alternate"
            type="application/rss+xml"
            title="{{ site.title | escape }}"
            href="{{ '/feed.xml' | relative_url }}"
        />
        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                mermaid.initialize({ startOnLoad: true, theme: 'dark' });
            });
        </script>
    </head>
    <body>
        <header class="site-header">
            <div class="wrapper">
                <a class="site-title" href="{{ '/' | relative_url }}"
                    >{{ site.title | escape }}</a
                >
                <nav class="site-nav">
                    <a class="page-link" href="{{ '/about/' | relative_url }}">About</a>
                </nav>
            </div>
        </header>

        <main class="page-content">
            <div class="wrapper">{{ content }}</div>
        </main>

        <footer class="site-footer">
            <div class="wrapper">
                <p>
                    &copy; {{ site.time | date: '%Y' }} {{ site.author | escape
                    }}. Built with Jekyll.
                </p>
            </div>
        </footer>
    </body>
</html>

---
layout: default
title: Home
---

<h3>Latest Posts</h3>

<ul class="blog-list">
  {% for post in site.posts limit:5 %}
    <li class="blog-list-item">
      <h2><a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a></h2>
      <p class="post-meta">
        <time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date: '%B %d, %Y' }}</time>
      </p>
    </li>
  {% endfor %}
</ul>
